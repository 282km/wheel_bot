<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Трансляция стола</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main id="app">
    <header class="header">
      <h1 id="title">Трансляция</h1>
      <p id="status" class="status">Загрузка…</p>
    </header>
    <div class="video-wrap">
      <video id="video" controls playsinline autoplay muted></video>
      <div id="offline" class="offline hidden">
        <p>Сейчас эфира нет.</p>
        <p class="muted">Обновите страницу, когда стол включат.</p>
      </div>
    </div>
    <p class="hint">Задержка эфира обычно 15–30 секунд. Если картинка не идёт — обновите страницу.</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
