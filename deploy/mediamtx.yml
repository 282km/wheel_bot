# MediaMTX: приём RTMP от OBS, отдача HLS.
# Установка: scripts/install_mediamtx.sh
# Конфиг на сервере: /etc/mediamtx.yml

logLevel: info
logDestinations: [stdout]

# Стабильнее при нестабильном upload с ноутбука (OBS)
readTimeout: 60s
writeTimeout: 60s
writeQueueSize: 1024

api: yes
apiAddress: 127.0.0.1:9997

rtmp: yes
rtmpAddress: :1935

hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsSegmentCount: 10
hlsSegmentDuration: 2s

paths:
  poker:
    source: publisher
    # OBS → Настройки → Трансляция:
    #   Сервер: rtmp://ВАШ_ДОМЕН:1935
    #   Ключ потока: poker
    # Опционально логин/пароль:
    # publishUser: obs
    # publishPass: ЗАМЕНИТЕ_НА_СЕКРЕТ
