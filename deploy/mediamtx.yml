# MediaMTX: приём RTMP от OBS, отдача HLS.
# Установка: scripts/install_mediamtx.sh
# После установки: scripts/generate_live_secrets.sh и правка пароля/path ниже.

logLevel: info
logDestinations: [stdout]

readTimeout: 60s
writeTimeout: 60s
writeQueueSize: 1024

api: yes
apiAddress: 127.0.0.1:9997

rtmp: yes
rtmpAddress: :1935

hls: yes
# Только localhost — снаружи HLS через nginx /hls/
hlsAddress: 127.0.0.1:8888
hlsAlwaysRemux: yes
hlsSegmentCount: 10
hlsSegmentDuration: 2s

paths:
  # Имя path = LIVE_STREAM_PATH в .env (не «poker» — см. scripts/generate_live_secrets.sh)
  livestream:
    source: publisher
    publishUser: obs
    publishPass: REPLACE_WITH_STRONG_PASSWORD
    # Опционально: только ваш IP (OBS с ноутбука). Обновляйте при смене IP.
    # publishIPs: ["203.0.113.10/32"]
